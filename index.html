<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>필름 재단 최적화</title>
<meta name="description" content="인테리어 필름 재단 최적화 계산기">
<meta name="theme-color" content="#1a1814">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="필름재단">
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#faf7f2;color:#2a2420;font-family:sans-serif;min-height:100vh;padding-bottom:60px;}
.hdr{background:#1a1814;color:#fff;padding:14px 18px;display:flex;align-items:center;gap:12px;}
.hdr h1{font-size:17px;font-weight:900;}
.hdr h1 span{color:#e8c14a;}
.hdr-sub{font-size:10px;color:rgba(255,255,255,.35);letter-spacing:1px;margin-left:4px;}
.fbar{background:#262218;padding:10px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.flbl{font-size:10px;color:rgba(255,255,255,.5);white-space:nowrap;}
.fbar input{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:5px;color:#fff;font-size:14px;font-weight:600;padding:5px 8px;text-align:center;width:75px;}
.fbar input:focus{outline:none;border-color:#e8c14a;}
.funit{font-size:11px;color:rgba(255,255,255,.4);}
.allow-g{margin-left:auto;display:flex;align-items:center;gap:6px;}
.allow-g label{font-size:10px;color:rgba(255,255,255,.5);}
.wrap{max-width:1200px;margin:0 auto;padding:14px 12px;display:grid;grid-template-columns:1fr;gap:14px;}
@media(min-width:900px){.wrap{grid-template-columns:400px 1fr;align-items:start;}}
.panel{background:#ffffff;border:1px solid #d8d0c4;border-radius:10px;margin-bottom:12px;overflow:hidden;}
.panel:last-child{margin-bottom:0;}
.ph{padding:10px 14px;border-bottom:1px solid #d8d0c4;background:#ede8de;display:flex;align-items:center;justify-content:space-between;}
.ph-t{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#9a8f84;}
.pb{padding:14px;}
.icard{border:1px solid #d8d0c4;border-radius:8px;margin-bottom:10px;overflow:hidden;}
.icard:last-child{margin-bottom:0;}
.ich{display:flex;align-items:center;gap:8px;padding:8px 11px;background:#ede8de;border-bottom:1px solid #d8d0c4;}
.inum{width:20px;height:20px;border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;}
.iname{border:none;background:transparent;font-size:12px;font-weight:700;color:#2a2420;flex:1;min-width:0;}
.iname:focus{outline:none;}
.dbtn{background:none;border:none;cursor:pointer;color:#9a8f84;font-size:15px;padding:0 3px;line-height:1;}
.icb{padding:10px;}
.cgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-bottom:10px;}
.cb{padding:5px 3px;border:1.5px solid #d8d0c4;border-radius:5px;background:#faf7f2;color:#9a8f84;font-size:11px;cursor:pointer;text-align:center;line-height:1.3;}
.cb.on{font-weight:700;border-color:#2c5f8a;background:#eef4fa;color:#2c5f8a;}
.drow{display:grid;grid-template-columns:1fr 1fr 68px;gap:6px;}
.dw{display:flex;flex-direction:column;gap:3px;}
.dw label{font-size:9px;color:#9a8f84;text-transform:uppercase;letter-spacing:1px;}
.dw input{background:#e6ddd0;border:1px solid #d0c8bc;border-radius:5px;color:#2a2420;font-size:14px;font-weight:600;padding:7px 7px;width:100%;}
.dw input:focus{outline:none;border-color:#1a5c8a;}
.du{font-size:9px;color:#9a8f84;text-align:right;margin-top:1px;}
.add-btn{width:100%;padding:10px;background:#faf7f2;border:1.5px dashed #c4b8a8;border-radius:7px;color:#9a8f84;font-size:12px;cursor:pointer;margin-bottom:8px;display:block;}
.go-btn{width:100%;padding:13px;background:#1a1814;color:#e8c14a;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.sb{background:#ede8de;border:1px solid #d8d0c4;border-radius:8px;padding:12px 8px;text-align:center;}
.sv{font-size:18px;font-weight:700;color:#c0392b;line-height:1;margin-bottom:4px;}
.sl{font-size:10px;color:#9a8f84;}
.urow{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:11px;}
.ulbl{width:56px;color:#9a8f84;flex-shrink:0;}
.ubg{flex:1;height:8px;background:#d8d0c4;border-radius:4px;overflow:hidden;}
.ufill{height:100%;border-radius:4px;background:#1a5c8a;}
.ufill.ov{background:#c0392b;}
.uval{font-size:11px;font-weight:600;width:46px;text-align:right;color:#6a5f58;}
.warn{background:#fff8e6;border:1px solid #f0c040;border-radius:7px;padding:10px 14px;font-size:12px;color:#8a6500;margin-bottom:12px;}
.dbox{background:#111;border-radius:8px;padding:10px;overflow:auto;max-height:600px;}
.zctrl{display:flex;align-items:center;gap:4px;}
.zb{background:#fff;border:1px solid #c4b8a8;border-radius:5px;color:#6a5f58;font-size:14px;width:28px;height:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.zr{width:auto;padding:0 8px;font-size:11px;}
.zl{font-size:11px;color:#9a8f84;min-width:36px;text-align:center;}
.leg{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;align-items:center;}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:#6a5f58;}
.ld{width:11px;height:11px;border-radius:2px;flex-shrink:0;}
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{text-align:left;padding:8px 10px;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:#9a8f84;border-bottom:2px solid #d8d0c4;white-space:nowrap;}
td{padding:7px 10px;border-bottom:1px solid #d8d0c4;font-size:11px;white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#ede8de;}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;border:1px solid;}
.empty{padding:50px 20px;text-align:center;color:#9a8f84;font-size:13px;line-height:2;}
.ei{font-size:36px;margin-bottom:10px;}
.info{font-size:11px;color:#9a8f84;text-align:right;margin-top:6px;}
/* 탭바 */
.tabbar{position:fixed;bottom:0;left:0;right:0;background:#1a1814;display:flex;border-top:1px solid #333;z-index:100;}
.tab{flex:1;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:none;color:rgba(255,255,255,.45);font-size:9px;letter-spacing:.5px;}
.tab.on{color:#e8c14a;}
.tab-icon{font-size:20px;line-height:1;}
/* 페이지 */
.page{display:none;}
.page.on{display:block;}
/* 기록 카드 */
.hcard{background:#fff;border:1px solid #d8d0c4;border-radius:10px;margin-bottom:12px;overflow:hidden;}
.hcard-head{padding:12px 14px;border-bottom:1px solid #d8d0c4;background:#ede8de;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.hcard-date{font-size:11px;color:#9a8f84;}
.hcard-title{font-size:13px;font-weight:700;color:#2a2420;flex:1;}
.hcard-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;background:#f0ede8;color:#6a5f58;}
.hcard-body{padding:12px 14px;}
.hcard-btns{display:flex;gap:8px;margin-top:10px;}
.load-btn{flex:1;padding:9px;background:#1a1814;color:#e8c14a;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;}
.del-btn2{padding:9px 14px;background:#fff;color:#c0392b;border:1px solid #d8d0c4;border-radius:7px;font-size:12px;cursor:pointer;}
.hist-empty{padding:40px 20px;text-align:center;color:#9a8f84;font-size:13px;line-height:2;}
.save-toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:#27ae60;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;}
.save-toast.show{opacity:1;}
/* 입력 팝업 모달 */
.input-modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px;}
.input-modal-box{background:#faf7f2;border-radius:16px;padding:24px 20px;width:100%;max-width:380px;box-shadow:0 12px 40px rgba(0,0,0,0.2);animation:popIn .2s ease;}
@keyframes popIn{from{opacity:0;transform:scale(0.92);}to{opacity:1;transform:scale(1);}}
.input-modal-label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#9a8f84;margin-bottom:8px;}
.input-modal-field{width:100%;background:#e6ddd0;border:1.5px solid #d0c8bc;border-radius:8px;color:#2a2420;font-size:16px;font-weight:600;padding:12px 14px;margin-bottom:16px;font-family:sans-serif;}
.input-modal-field:focus{outline:none;border-color:#1a5c8a;}
.input-modal-btns{display:flex;gap:8px;}
.input-modal-cancel{flex:1;padding:12px;background:#ede8de;color:#6a5f58;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:sans-serif;}
.input-modal-confirm{flex:1;padding:12px;background:#1a1814;color:#e8c14a;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:sans-serif;}

/* 커스텀 확인 모달 */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:500;display:flex;align-items:center;justify-content:center;}
.modal-box{background:#fff;border-radius:14px;padding:24px 20px;width:80%;max-width:320px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.2);}
.modal-title{font-size:15px;font-weight:700;color:#2a2420;margin-bottom:8px;}
.modal-msg{font-size:13px;color:#6a5f58;margin-bottom:20px;line-height:1.6;}
.modal-btns{display:flex;gap:8px;}
.modal-cancel{flex:1;padding:11px;background:#faf7f2;color:#6a5f58;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;}
.modal-confirm{flex:1;padding:11px;background:#c0392b;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;}
/* 현장정보 폼 */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.info-grid.full{grid-template-columns:1fr;}
.info-row{display:flex;flex-direction:column;gap:3px;}
.info-row label{font-size:9px;color:#9a8f84;text-transform:uppercase;letter-spacing:1px;font-weight:700;}
.info-input{background:#ede8de;border:1px solid #d8d0c4;border-radius:5px;color:#2a2420;font-size:13px;font-weight:600;padding:8px 10px;width:100%;}
.info-input:focus{outline:none;border-color:#1a5c8a;}
.section-divider{font-size:9px;color:#9a8f84;text-transform:uppercase;letter-spacing:2px;font-weight:700;padding:10px 0 6px;border-bottom:1px solid #d8d0c4;margin-bottom:8px;}
/* 브랜드 선택 */
.brand-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-top:4px;}
.brand-btn{padding:7px 4px;border:1.5px solid #d8d0c4;border-radius:6px;background:#fff;color:#6a5f58;font-size:12px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;}
.brand-btn:hover{border-color:#1a5c8a;color:#1a5c8a;}
.brand-btn.on{border-color:#1a5c8a;background:#eef4fa;color:#1a5c8a;font-weight:700;}
/* 모델명 입력 - lang 속성으로 영문 키패드 */
.model-input{background:#ede8de;border:1px solid #d8d0c4;border-radius:5px;color:#2a2420;font-size:13px;font-weight:600;padding:8px 10px;width:100%;ime-mode:disabled;}
.model-input:focus{outline:none;border-color:#1a5c8a;}
</style>
</head>
<body>
<div class="save-toast" id="toast">저장됐어요!</div>

<!-- 입력 팝업 모달 -->
<div class="input-modal-overlay" id="inputModal" style="display:none;">
  <div class="input-modal-box">
    <div class="input-modal-label" id="inputModalLabel">입력</div>
    <input type="text" class="input-modal-field" id="inputModalField" autocomplete="off">
    <div class="input-modal-btns">
      <button class="input-modal-cancel" id="inputModalCancel">취소</button>
      <button class="input-modal-confirm" id="inputModalConfirm">확인</button>
    </div>
  </div>
</div>

<!-- 커스텀 확인 모달 -->
<div class="modal-overlay" id="confirmModal" style="display:none;">
  <div class="modal-box">
    <div class="modal-title" id="modalTitle">확인</div>
    <div class="modal-msg" id="modalMsg"></div>
    <div class="modal-btns">
      <button class="modal-cancel" id="modalCancel">취소</button>
      <button class="modal-confirm" id="modalConfirm">삭제</button>
    </div>
  </div>
</div>

<!-- 계산 페이지 -->
<div class="page on" id="page-calc">
<div class="hdr">
  <h1>재단<span>왕</span></h1>
  <span class="hdr-sub">INTERIOR FILM PRO</span>
</div>
<div class="fbar">
  <span class="flbl">필름 폭</span>
  <input id="fw" type="number" value="1220" readonly style="cursor:pointer;" onclick="showInputModal('필름 폭 (mm)', this.value==='1220'?'':	his.value, 'number', function(v){var el=document.getElementById('fw');el.value=v===''?'1220':v;})">
  <span class="funit">mm</span>
  <span class="flbl">필름 길이</span>
  <input id="fl" type="number" value="0" readonly style="cursor:pointer;" onclick="showInputModal('필름 길이 (m)', this.value==='0'?'':	his.value, 'number', function(v){var el=document.getElementById('fl');el.value=v===''?'0':v;})">
  <span class="funit">m</span>
  <div class="allow-g">
    <label>방염</label>
    <div style="display:flex;gap:5px;">
      <button id="btn-flameyes" onclick="setFlame(true)"
        style="padding:5px 12px;border-radius:5px;border:1.5px solid rgba(255,255,255,.25);background:#e8c14a;color:#1a1814;font-size:12px;font-weight:700;cursor:pointer;">방염</button>
      <button id="btn-flameno" onclick="setFlame(false)"
        style="padding:5px 12px;border-radius:5px;border:1.5px solid rgba(255,255,255,.25);background:rgba(255,255,255,.1);color:rgba(255,255,255,.6);font-size:12px;font-weight:600;cursor:pointer;">비방염</button>
    </div>
  </div>
  <div class="allow-g">
    <label>나무 무늬</label>
    <div style="display:flex;gap:5px;">
      <button id="btn-patternyes" onclick="setPattern(true)"
        style="padding:5px 12px;border-radius:5px;border:1.5px solid rgba(255,255,255,.25);background:rgba(255,255,255,.1);color:rgba(255,255,255,.6);font-size:12px;font-weight:600;cursor:pointer;">있음</button>
      <button id="btn-patternno" onclick="setPattern(false)"
        style="padding:5px 12px;border-radius:5px;border:1.5px solid rgba(255,255,255,.25);background:#e8c14a;color:#1a1814;font-size:12px;font-weight:700;cursor:pointer;">없음</button>
    </div>
  </div>
</div>
<div class="wrap">
  <div>
    <div class="panel">
      <div class="ph"><span class="ph-t">현장 정보</span></div>
      <div class="pb" style="padding:12px 14px;">

        <!-- 현장명 -->
        <div class="info-grid full" style="margin-bottom:8px;">
          <div class="info-row">
            <label>현장명</label>
            <input type="text" id="siteName" class="info-input" placeholder="예) 강남 아파트 101호" readonly onclick="showInputModal('현장명', this.value, 'text', function(v){document.getElementById('siteName').value=v;})">
          </div>
        </div>

        <!-- 고객명 + 연락처 -->
        <div class="info-grid">
          <div class="info-row">
            <label>고객명</label>
            <input type="text" id="clientName" class="info-input" placeholder="홍길동" readonly onclick="showInputModal('고객명', this.value, 'text', function(v){document.getElementById('clientName').value=v;})">
          </div>
          <div class="info-row">
            <label>연락처</label>
            <input type="text" id="clientPhone" class="info-input" placeholder="010-0000-0000" readonly onclick="showInputModal('연락처', this.value, 'tel', function(v){document.getElementById('clientPhone').value=v;})">
          </div>
        </div>

        <!-- 원단 정보 -->
        <div class="section-divider">원단 정보</div>

        <!-- 브랜드 선택 -->
        <div class="info-row" style="margin-bottom:8px;">
          <label>브랜드</label>
          <div class="brand-grid" id="brandGrid">
            <button class="brand-btn" data-brand="LX" onclick="selectBrand(this)">LX</button>
            <button class="brand-btn" data-brand="현대보닥" onclick="selectBrand(this)">현대보닥</button>
            <button class="brand-btn" data-brand="KCC" onclick="selectBrand(this)">KCC</button>
            <button class="brand-btn" data-brand="영림" onclick="selectBrand(this)">영림</button>
            <button class="brand-btn" data-brand="예림" onclick="selectBrand(this)">예림</button>
            <button class="brand-btn" data-brand="3M" onclick="selectBrand(this)">3M</button>
            <button class="brand-btn" data-brand="삼성" onclick="selectBrand(this)">삼성</button>
          </div>
        </div>

        <!-- 브랜드 직접입력 -->
        <div class="info-row" style="margin-bottom:8px;">
          <label>브랜드 직접입력</label>
          <input type="text" id="brandCustom" class="info-input" placeholder="직접 입력" readonly onclick="showInputModal('브랜드 직접입력', this.value, 'text', function(v){document.getElementById('brandCustom').value=v;clearBrandBtn();})">
        </div>

        <!-- 모델명 -->
        <div class="info-row">
          <label>모델명</label>
          <input type="text" id="modelName" class="model-input" placeholder="예) EW20098-51" readonly onclick="showInputModal('모델명', this.value, 'text', function(v){document.getElementById('modelName').value=v;})">
        </div>

      </div>
    </div>
    <div class="panel">
      <div class="ph">
        <span class="ph-t">재단 항목 목록</span>
        <span id="icnt" style="font-size:11px;color:#9a9590;">0개</span>
      </div>
      <div class="pb">
        <div id="ilist"></div>
        <button class="add-btn" id="addBtn">+ 항목 추가</button>
        <button class="go-btn" id="calcBtn">✂ 최적 재단 계산하기</button>
      </div>
    </div>
  </div>
  <div id="rcol">
    <div class="panel"><div class="pb">
      <div class="empty"><div class="ei">✂</div>항목을 추가하고<br><strong>최적 재단 계산하기</strong>를 눌러주세요</div>
    </div></div>
  </div>
</div>
</div>

<!-- 기록 페이지 -->
<div class="page" id="page-hist">
<div class="hdr">
  <h1>계산 <span>기록</span></h1>
</div>
<div style="max-width:800px;margin:0 auto;padding:14px 12px;">
  <div style="margin-bottom:12px;position:relative;">
    <input type="text" id="searchBox" placeholder="🔍 현장명으로 검색" readonly
      onclick="openSearchModal()"
      style="width:100%;padding:10px 14px;border:1px solid #d8d0c4;border-radius:8px;font-size:14px;background:#fff;color:#2a2420;cursor:pointer;">
    <span id="searchClear" onclick="clearSearch()" style="display:none;position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:18px;color:#9a8f84;line-height:1;">✕</span>
  </div>
  <div id="hist-list"></div>
</div>
</div>

<!-- 하단 탭바 -->
<div class="tabbar">
  <button class="tab on" id="tab-calc" onclick="showTab('calc')">
    <span class="tab-icon">✂</span>재단 계산
  </button>
  <button class="tab" id="tab-hist" onclick="showTab('hist')">
    <span class="tab-icon">📋</span>계산 기록
  </button>
</div>
<script type="text/javascript">

// ── 공통: 세그먼트 업데이트 ─────────────────────────────────
function updateSegs(segs,bx,pw,by,ph){
  var nx=[];
  for(var gi=0;gi<segs.length;gi++){
    var s=segs[gi],ox=Math.max(bx,s.x0),ex=Math.min(bx+pw,s.x1);
    if(ox>=ex){nx.push({x0:s.x0,x1:s.x1,h:s.h});}
    else{
      if(s.x0<ox)nx.push({x0:s.x0,x1:ox,h:s.h});
      nx.push({x0:ox,x1:ex,h:by+ph});
      if(ex<s.x1)nx.push({x0:ex,x1:s.x1,h:s.h});
    }
  }
  nx.sort(function(a,b){return a.x0-b.x0;});
  var mg=[];
  for(var ni=0;ni<nx.length;ni++){
    if(mg.length&&mg[mg.length-1].x1===nx[ni].x0&&mg[mg.length-1].h===nx[ni].h)
      mg[mg.length-1].x1=nx[ni].x1;
    else mg.push({x0:nx[ni].x0,x1:nx[ni].x1,h:nx[ni].h});
  }
  return mg;
}

function getBestPos(segs,pw,fw){
  var xs=[],gi;
  for(gi=0;gi<segs.length;gi++){
    var x0=segs[gi].x0;
    if(x0+pw<=fw){var f=false;for(var xi=0;xi<xs.length;xi++)if(xs[xi]===x0){f=true;break;}if(!f)xs.push(x0);}
  }
  if(!xs.length)xs.push(0);
  var bx=0,by=Infinity,bw=Infinity;
  for(var xi=0;xi<xs.length;xi++){
    var x=xs[xi],y=0,waste=0;
    for(gi=0;gi<segs.length;gi++){var ox=Math.max(x,segs[gi].x0),ex=Math.min(x+pw,segs[gi].x1);if(ox<ex&&segs[gi].h>y)y=segs[gi].h;}
    for(gi=0;gi<segs.length;gi++){var ox=Math.max(x,segs[gi].x0),ex=Math.min(x+pw,segs[gi].x1);if(ox<ex)waste+=(y-segs[gi].h)*(ex-ox);}
    if(y<by||(y===by&&waste<bw)){by=y;bw=waste;bx=x;}
  }
  if(by===Infinity){var mh=0;for(gi=0;gi<segs.length;gi++)if(segs[gi].h>mh)mh=segs[gi].h;by=mh;bx=0;}
  return{bx:bx,by:by};
}

function buildStrips(flat){
  var ySet={},ys=[],strips=[];
  for(var i=0;i<flat.length;i++)ySet[flat[i].y]=true;
  for(var y in ySet)ys.push(parseFloat(y));
  ys.sort(function(a,b){return a-b;});
  for(var i=0;i<ys.length;i++){
    var y=ys[i],items=[],mb=0;
    for(var j=0;j<flat.length;j++)if(flat[j].y===y)items.push(flat[j]);
    for(var j=0;j<items.length;j++)if(items[j].y+items[j].pH>mb)mb=items[j].y+items[j].pH;
    strips.push({y:y,height:mb-y,slots:items});
  }
  return strips;
}

// ── 무늬있음: 방향 고정 Skyline ──────────────────────────────
function packFixed(pieces,fw){
  var sorts=[
    function(a,b){return b.pW*b.pH-a.pW*a.pH;},
    function(a,b){return b.pH-a.pH;},
    function(a,b){return b.pW-a.pW;},
    function(a,b){return(b.pW+b.pH)-(a.pW+a.pH);}
  ];
  var bestTotal=Infinity,bestFlat=null;
  for(var si=0;si<sorts.length;si++){
    var sp=pieces.slice().sort(sorts[si]);
    var segs=[{x0:0,x1:fw,h:0}],placed=[],gi;
    for(var pi=0;pi<sp.length;pi++){
      var p=sp[pi];
      var pos=getBestPos(segs,p.pW,fw);
      placed.push({label:p.label,cat:p.cat,pW:p.pW,pH:p.pH,x:pos.bx,y:pos.by,rotated:false});
      segs=updateSegs(segs,pos.bx,p.pW,pos.by,p.pH);
    }
    var mh=0;for(gi=0;gi<segs.length;gi++)if(segs[gi].h>mh)mh=segs[gi].h;
    if(mh<bestTotal){bestTotal=mh;bestFlat=placed.slice();}
  }
  return{flat:bestFlat,total:bestTotal,strips:buildStrips(bestFlat)};
}

// ── 무늬없음: 회전 허용 Skyline ──────────────────────────────
function packRotatable(pieces,fw){
  var sorts=[
    function(a,b){return b.pW*b.pH-a.pW*a.pH;},
    function(a,b){return b.pH-a.pH;},
    function(a,b){return b.pW-a.pW;},
    function(a,b){return(b.pW+b.pH)-(a.pW+a.pH);},
    function(a,b){return Math.max(b.pW,b.pH)-Math.max(a.pW,a.pH);},
    function(a,b){return Math.min(b.pW,b.pH)-Math.min(a.pW,a.pH);}
  ];
  var bestTotal=Infinity,bestFlat=null;

  for(var si=0;si<sorts.length;si++){
    var sp=pieces.slice().sort(sorts[si]);
    var n=sp.length;

    // 전략1: 모두 원본, 전략2: greedy 방향선택, 전략3: 모두 회전
    for(var strat=0;strat<3;strat++){
      var segs=[{x0:0,x1:fw,h:0}],placed=[],gi;
      for(var pi=0;pi<n;pi++){
        var p=sp[pi];
        var canRot=(p.pH<=fw && p.pW!==p.pH);
        var useRot=false;
        if(canRot){
          if(strat===1){
            // greedy: 더 낮은 y를 주는 방향 선택
            var pos0=getBestPos(segs,p.pW,fw);
            var pos1=getBestPos(segs,p.pH,fw);
            useRot=(pos1.by<pos0.by)||(pos1.by===pos0.by&&p.pH<p.pW);
          } else if(strat===2){
            useRot=true;
          }
        }
        var pw=useRot?p.pH:p.pW;
        var ph=useRot?p.pW:p.pH;
        if(pw>fw){pw=p.pW;ph=p.pH;useRot=false;}
        var pos=getBestPos(segs,pw,fw);
        placed.push({label:p.label,cat:p.cat,pW:pw,pH:ph,x:pos.bx,y:pos.by,rotated:useRot});
        segs=updateSegs(segs,pos.bx,pw,pos.by,ph);
      }
      var mh=0;for(gi=0;gi<segs.length;gi++)if(segs[gi].h>mh)mh=segs[gi].h;
      if(mh<bestTotal){bestTotal=mh;bestFlat=placed.slice();}
    }
  }
  return{flat:bestFlat,total:bestTotal,strips:buildStrips(bestFlat)};
}

// ── 메인 pack 함수 (무늬 여부에 따라 분기) ───────────────────
function pack(pieces,fw){
  if(hasPattern){
    return packFixed(pieces,fw);
  } else {
    return packRotatable(pieces,fw);
  }
}

function calculate(){
  var items=getItems();
  if(!items.length){alert("항목을 먼저 추가하세요.");return;}
  var fw=parseFloat(document.getElementById("fw").value)||1220;
  var fl=(parseFloat(document.getElementById("fl").value)||0)*1000;
  var al=0;
  var pieces=[];
  for(var i=0;i<items.length;i++){
    var it=items[i];
    for(var q=0;q<it.qty;q++)
      pieces.push({label:it.qty>1?it.name+"("+(q+1)+"/"+it.qty+")":it.name,cat:it.cat,pW:it.pW+al*2,pH:it.pL+al*2});
  }
  var over=[];
  for(var i=0;i<pieces.length;i++)if(pieces[i].pW>fw)over.push(pieces[i]);
  if(over.length){var msg="필름 폭 초과:\n";for(var i=0;i<over.length;i++)msg+="- "+over[i].label+": "+over[i].pW+"mm\n";alert(msg);return;}
  var res=pack(pieces,fw);
  var ua=0;for(var i=0;i<pieces.length;i++)ua+=pieces[i].pW*pieces[i].pH;
  var eff=(ua/(fw*res.total)*100).toFixed(1);
  renderResult(res.flat,res.strips,res.total,eff,fl>0&&res.total>fl,fw,fl,isFlame);
  var siteName=document.getElementById("siteName").value.trim()||"현장명 없음";
  var clientName=document.getElementById("clientName").value.trim();
  var clientPhone=document.getElementById("clientPhone").value.trim();
  var brand=getSelectedBrand();
  var modelName=document.getElementById("modelName").value.trim();
  saveHistory(siteName,clientName,clientPhone,brand,modelName,items,res.flat,res.total,eff,fw,fl,isFlame,hasPattern);
}

function drw(){
  if(!dD)return;
  var flat=dD.flat,strips=dD.strips,total=dD.total,fw=dD.fw;
  var cv=document.getElementById("dcv");if(!cv)return;
  var sc=dS,W=Math.round(fw*sc),H=Math.round(total*sc);
  cv.width=W;cv.height=H;cv.style.width=W+"px";cv.style.height=H+"px";
  var ctx=cv.getContext("2d");
  ctx.fillStyle="#141414";ctx.fillRect(0,0,W,H);
  ctx.strokeStyle="rgba(255,255,255,0.04)";ctx.lineWidth=1;
  for(var m=100;m<total;m+=100){ctx.beginPath();ctx.moveTo(0,m*sc);ctx.lineTo(W,m*sc);ctx.stroke();}
  for(var m=100;m<fw;m+=100){ctx.beginPath();ctx.moveTo(m*sc,0);ctx.lineTo(m*sc,H);ctx.stroke();}
  for(var i=0;i<strips.length;i++){
    if(strips[i].y>0){
      var sy=strips[i].y*sc;
      ctx.strokeStyle="rgba(255,255,255,0.12)";ctx.lineWidth=1;ctx.setLineDash([5,4]);
      ctx.beginPath();ctx.moveTo(0,sy);ctx.lineTo(W,sy);ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle="rgba(255,255,255,0.3)";ctx.font="9px sans-serif";ctx.textAlign="left";ctx.textBaseline="top";
      ctx.fillText(strips[i].y.toLocaleString()+"mm",3,sy+2);
    }
  }
  var ey=H-1;
  ctx.strokeStyle="rgba(232,193,74,0.6)";ctx.lineWidth=1.5;ctx.setLineDash([6,4]);
  ctx.beginPath();ctx.moveTo(0,ey);ctx.lineTo(W,ey);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle="rgba(232,193,74,0.85)";ctx.font="bold 9px sans-serif";ctx.textAlign="left";ctx.textBaseline="bottom";
  ctx.fillText("▲ "+total.toLocaleString()+"mm",3,ey-2);
  for(var i=0;i<flat.length;i++){
    var p=flat[i],c=cc(p.cat);
    var r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);
    var x=p.x*sc,y=p.y*sc,w=p.pW*sc,h=p.pH*sc;
    ctx.fillStyle="rgba("+r+","+g+","+b+",0.28)";ctx.fillRect(x+1,y+1,w-2,h-2);
    ctx.strokeStyle="rgba("+r+","+g+","+b+",0.9)";ctx.lineWidth=1.5;ctx.strokeRect(x+1,y+1,w-2,h-2);
    if(w>22&&h>14){
      ctx.textAlign="center";ctx.textBaseline="middle";

      var sn=p.label.length>9?p.label.slice(0,8)+"…":p.label;
      ctx.fillText(sn,x+w/2,y+h/2+(h>fs*3?-fs*0.7:0));
      if(h>fs*3){ctx.font=Math.max(6,fs-1.5)+"px sans-serif";ctx.fillStyle="rgba(255,255,255,0.4)";ctx.fillText(p.pW+"x"+p.pH,x+w/2,y+h/2+fs*0.8);}
    }
  }

  ctx.fillStyle="rgba(232,193,74,0.7)";ctx.font="9px sans-serif";ctx.textAlign="center";ctx.textBaseline="top";
  ctx.fillText("< "+fw+"mm >",W/2,3);
}

function zD(d){dS=Math.min(Math.max(dB*0.3,dS*d),dB*10);drw();uzl();}
function rZ(){dS=dB;drw();uzl();}
function uzl(){var e=document.getElementById("zlbl");if(e)e.textContent=Math.round(dS/dB*100)+"%";}
function iZ(){
  var box=document.getElementById("dscroll");
  if(!box||zI)return;zI=true;
  box.addEventListener("wheel",function(e){e.preventDefault();dS=Math.min(Math.max(dB*0.3,dS*(e.deltaY<0?1.1:0.9)),dB*10);drw();uzl();},{passive:false});
  var ld=null;
  box.addEventListener("touchstart",function(e){if(e.touches.length===2)ld=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);},{passive:true});
  box.addEventListener("touchmove",function(e){if(e.touches.length===2&&ld!==null){e.preventDefault();var d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);dS=Math.min(Math.max(dB*0.3,dS*(d/ld)),dB*10);ld=d;drw();uzl();}},{passive:false});
  box.addEventListener("touchend",function(){ld=null;},{passive:true});
}

// ── 입력 팝업 모달 ───────────────────────────────────────────
function showInputModal(label, currentVal, inputType, onConfirm){
  var overlay=document.getElementById("inputModal");
  var field=document.getElementById("inputModalField");
  var lbl=document.getElementById("inputModalLabel");
  lbl.textContent=label;
  field.value=currentVal||"";
  field.type=inputType||"text";
  // 숫자 입력이면 0 초기화
  if(inputType==="number" && field.value==="0") field.value="";
  overlay.style.display="flex";
  setTimeout(function(){field.focus();field.select();},100);

  var confirmBtn=document.getElementById("inputModalConfirm");
  var cancelBtn=document.getElementById("inputModalCancel");
  var nc=confirmBtn.cloneNode(true);
  var nca=cancelBtn.cloneNode(true);
  confirmBtn.parentNode.replaceChild(nc,confirmBtn);
  cancelBtn.parentNode.replaceChild(nca,cancelBtn);

  function close(){ overlay.style.display="none"; }

  document.getElementById("inputModalConfirm").onclick=function(){
    var val=document.getElementById("inputModalField").value;
    close(); onConfirm(val);
  };
  document.getElementById("inputModalCancel").onclick=close;
  overlay.onclick=function(e){ if(e.target===overlay) close(); };

  // 엔터키로 확인
  document.getElementById("inputModalField").onkeydown=function(e){
    if(e.key==="Enter"){ document.getElementById("inputModalConfirm").click(); }
  };
}

// ── 커스텀 확인 모달 ─────────────────────────────────────────
function showConfirm(title, msg, onConfirm){
  var overlay=document.getElementById("confirmModal");
  document.getElementById("modalTitle").textContent=title;
  document.getElementById("modalMsg").textContent=msg;
  overlay.style.display="flex";

  var confirmBtn=document.getElementById("modalConfirm");
  var cancelBtn=document.getElementById("modalCancel");

  // 이전 이벤트 제거
  var newConfirm=confirmBtn.cloneNode(true);
  var newCancel=cancelBtn.cloneNode(true);
  confirmBtn.parentNode.replaceChild(newConfirm,confirmBtn);
  cancelBtn.parentNode.replaceChild(newCancel,cancelBtn);

  document.getElementById("modalConfirm").onclick=function(){
    overlay.style.display="none";
    onConfirm();
  };
  document.getElementById("modalCancel").onclick=function(){
    overlay.style.display="none";
  };
  // 오버레이 클릭시 닫기
  overlay.onclick=function(e){
    if(e.target===overlay) overlay.style.display="none";
  };
}

// ── 저장 ──────────────────────────────────────────────────────
function saveHistory(siteName,clientName,clientPhone,brand,modelName,items,flat,total,eff,fw,fl,flame,pattern){
  try{
    var now=new Date();
    var dateStr=now.getFullYear()+"."+(now.getMonth()+1)+"."+(("0"+now.getDate()).slice(-2))+" "+(("0"+now.getHours()).slice(-2))+":"+(("0"+now.getMinutes()).slice(-2));
    var record={
      id: now.getTime(),
      date: dateStr,
      siteName: siteName,
      clientName: clientName,
      clientPhone: clientPhone,
      brand: brand,
      modelName: modelName,
      items: items,
      flat: flat,
      total: total,
      eff: eff,
      fw: fw,
      fl: fl,
      flame: flame,
      pattern: pattern
    };
    var saved=[];
    try{saved=JSON.parse(localStorage.getItem("filmHistory")||"[]");}catch(e){}
    saved.unshift(record);
    if(saved.length>50) saved=saved.slice(0,50);
    localStorage.setItem("filmHistory",JSON.stringify(saved));
    showToast();
  }catch(e){}
}

function showToast(){
  var t=document.getElementById("toast");
  t.className="save-toast show";
  setTimeout(function(){t.className="save-toast";},2000);
}

// ── 기록 불러오기 ─────────────────────────────────────────────
function getHistory(){
  try{return JSON.parse(localStorage.getItem("filmHistory")||"[]");}catch(e){return [];}
}

function renderHistory(){
  var list=document.getElementById("hist-list");
  if(!list)return;
  list.innerHTML="";
  var keyword=(document.getElementById("searchBox")?document.getElementById("searchBox").value.trim().toLowerCase():"");
  var all=getHistory();
  var records=keyword?all.filter(function(r){return (r.siteName||"").toLowerCase().indexOf(keyword)>=0;}):all;
  if(!records.length){
    var e=document.createElement("div");e.className="hist-empty";
    e.innerHTML="<div style='font-size:36px;margin-bottom:10px'>📋</div>아직 저장된 기록이 없어요<br>계산하면 자동으로 저장됩니다";
    list.appendChild(e);return;
  }
  for(var i=0;i<records.length;i++){
    (function(rec){
      var card=document.createElement("div");card.className="hcard";
      // 헤더
      var hd=document.createElement("div");hd.className="hcard-head";
      var left=document.createElement("div");left.style.flex="1";
      var dt=document.createElement("div");dt.className="hcard-date";dt.textContent=rec.date;
      var tl=document.createElement("div");tl.className="hcard-title";
      tl.textContent=rec.siteName||"현장명 없음";
      var sub=document.createElement("div");
      sub.style.cssText="font-size:11px;color:#5a5650;margin-top:2px;";
      sub.textContent=rec.items.length+"개 항목 · "+(rec.total/1000).toFixed(2)+"M · "+rec.eff+"% 사용률";
      var meta=document.createElement("div");
      meta.style.cssText="font-size:11px;color:#9a9590;margin-top:3px;display:flex;flex-wrap:wrap;gap:6px;";
      if(rec.clientName){var s=document.createElement("span");s.textContent="👤 "+rec.clientName;meta.appendChild(s);}
      if(rec.clientPhone){var s=document.createElement("span");s.textContent="📞 "+rec.clientPhone;meta.appendChild(s);}
      if(rec.brand||rec.modelName){var s=document.createElement("span");s.textContent="🎨 "+(rec.brand||"")+(rec.modelName?" "+rec.modelName:"");meta.appendChild(s);}
      var sf=document.createElement("span");sf.textContent=rec.flame?"🔥 방염":"비방염";meta.appendChild(sf);
      var sp=document.createElement("span");sp.textContent=rec.pattern?"🌲 무늬있음":"무늬없음";meta.appendChild(sp);
      var badges=document.createElement("div");badges.className="hcard-badges";
      // 카테고리별 항목 요약
      var catMap={};
      for(var j=0;j<rec.items.length;j++){
        var nm=cl(rec.items[j].cat);
        catMap[nm]=(catMap[nm]||0)+rec.items[j].qty;
      }
      for(var nm in catMap){
        var b=document.createElement("span");b.className="badge";
        b.textContent=nm+" "+catMap[nm]+"개";badges.appendChild(b);
      }
      left.appendChild(dt);left.appendChild(tl);left.appendChild(sub);left.appendChild(meta);left.appendChild(badges);
      hd.appendChild(left);
      card.appendChild(hd);
      // 바디
      var bd=document.createElement("div");bd.className="hcard-body";
      var info=document.createElement("div");
      info.style.cssText="font-size:11px;color:#9a9590;margin-bottom:8px;";
      info.textContent="필름: "+rec.fw+"mm × "+(rec.fl?rec.fl.toLocaleString()+"mm":"미설정")+" | "+(rec.flame?"방염":"비방염");
      bd.appendChild(info);
      // 버튼
      var btns=document.createElement("div");btns.className="hcard-btns";
      var lb=document.createElement("button");lb.className="load-btn";lb.textContent="불러오기";
      lb.onclick=function(){loadRecord(rec);};
      var db=document.createElement("button");db.className="del-btn2";db.textContent="삭제";
      db.onclick=function(){
        showConfirm("기록 삭제", "이 기록을 삭제할까요?\n삭제 후 복구할 수 없습니다.", function(){
          var saved=getHistory();
          saved=saved.filter(function(r){return r.id!==rec.id;});
          localStorage.setItem("filmHistory",JSON.stringify(saved));
          renderHistory();
        });
      };
      btns.appendChild(lb);btns.appendChild(db);
      bd.appendChild(btns);
      card.appendChild(bd);
      list.appendChild(card);
    })(records[i]);
  }
}

function loadRecord(rec){
  // 항목 초기화
  IDS=[];seq=0;
  document.getElementById("ilist").innerHTML="";
  document.getElementById("icnt").textContent="0개";
  // 필름 설정 복원
  document.getElementById("fw").value=rec.fw;
  document.getElementById("fl").value=rec.fl?rec.fl/1000:0;
  document.getElementById("siteName").value=rec.siteName||"";
  document.getElementById("clientName").value=rec.clientName||"";
  document.getElementById("clientPhone").value=rec.clientPhone||"";
  document.getElementById("modelName").value=rec.modelName||"";
  setSelectedBrand(rec.brand||"");
  setFlame(rec.flame||false);
  isFlame=rec.flame||false;
  setPattern(rec.pattern||false);
  hasPattern=rec.pattern||false;
  // 항목 복원
  for(var i=0;i<rec.items.length;i++){
    var it=rec.items[i];
    addItemData(it.cat,it.pW,it.pL,it.name,it.qty);
  }
  // 탭 전환 후 계산 결과 표시
  showTab("calc");
  // 결과 다시 렌더링
  setTimeout(function(){
    renderResult(rec.flat,[],rec.total,rec.eff,rec.fl>0&&rec.total>rec.fl,rec.fw,rec.fl,rec.flame||false);
  },100);
  alert("불러왔어요! 항목을 확인하고 다시 계산할 수 있어요.");
}

function addItemData(cat,pW,pL,name,qty){
  seq++;
  var id="item"+seq;
  IDS.push(id);
  var card=document.createElement("div");card.className="icard";card.id=id;
  var head=document.createElement("div");head.className="ich";
  var num=document.createElement("div");num.className="inum";num.style.background=cc(cat);num.textContent=IDS.length;
  var ni=document.createElement("input");ni.className="iname";ni.type="text";ni.placeholder="이름 입력";ni.readOnly=true;
  ni.addEventListener("click",function(){var self=this;showInputModal("항목 이름",self.value,"text",function(v){self.value=v;});});ni.value=name||"";
  var db=document.createElement("button");db.className="dbtn";db.textContent="X";
  db.setAttribute("data-id",id);
  db.addEventListener("click",function(){delItem(this.getAttribute("data-id"));});
  head.appendChild(num);head.appendChild(ni);head.appendChild(db);
  var body=document.createElement("div");body.className="icb";
  var cg=document.createElement("div");cg.className="cgrid";
  for(var i=0;i<CATS.length;i++){
    (function(c,cg,num){
      var b=document.createElement("button");
      b.className="cb"+(c.id===cat?" on":"");
      b.textContent=c.lb;b.setAttribute("data-c",c.id);
      b.addEventListener("click",function(){
        var bs=cg.querySelectorAll(".cb");
        for(var j=0;j<bs.length;j++)bs[j].className="cb";
        this.className="cb on";
        num.style.background=cc(this.getAttribute("data-c"));
      });
      cg.appendChild(b);
    })(CATS[i],cg,num);
  }
  var dr=document.createElement("div");dr.className="drow";
  function mk(lbl,cls,val,def){
    var w=document.createElement("div");w.className="dw";
    var l=document.createElement("label");l.textContent=lbl;
    var inp=document.createElement("input");inp.type="number";inp.className=cls;inp.value=val;
    var dv=String(def);
    inp.addEventListener("focus",function(){if(this.value===dv)this.value="";});
    inp.addEventListener("blur",function(){if(this.value==="")this.value=dv;});
    var u=document.createElement("div");u.className="du";u.textContent=cls==="iq"?"개":"mm";
    w.appendChild(l);w.appendChild(inp);w.appendChild(u);return w;
  }
  dr.appendChild(mk("폭 (W)","iw",pW,0));
  dr.appendChild(mk("길이 (L)","il",pL,0));
  dr.appendChild(mk("수량","iq",qty||1,1));
  body.appendChild(cg);body.appendChild(dr);
  card.appendChild(head);card.appendChild(body);
  document.getElementById("ilist").appendChild(card);
  document.getElementById("icnt").textContent=IDS.length+"개";
}
